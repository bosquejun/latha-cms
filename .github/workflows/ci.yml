name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit and integration tests
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

  # Browser E2E smoke tests: boot the playground dev server and drive the real
  # Studio UI (login, CRUD, media upload, extensions) with Playwright.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The dev server serves @kon10/* from source, but a build keeps parity
      # with the documented verify flow and surfaces build breaks early.
      - name: Build packages and apps
        run: pnpm build

      # playwright-core ships no install CLI, so provision Chromium via the
      # full playwright package at the exact version playwright-core resolved to
      # (matching browser revisions), then let playwright-core find it. Runs in
      # the playground dir so the devDep resolves (pnpm doesn't hoist it to root).
      - name: Install Chromium for Playwright
        working-directory: apps/playground
        run: |
          PW_VERSION="$(node -p "require('playwright-core/package.json').version")"
          npx --yes "playwright@${PW_VERSION}" install --with-deps chromium

      - name: Browser E2E smoke tests
        run: pnpm --filter @kon10/playground test:e2e

  # Scaffold an app with create-kon10-app against the workspace packages and
  # build it — this is what effectively typechecks the shipped template.
  scaffold-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Scaffold a fresh app
        run: node "$GITHUB_WORKSPACE/packages/create-kon10-app/dist/index.js" smoke-app
        working-directory: ${{ runner.temp }}

      - name: Point @kon10/* at the workspace packages
        run: |
          node -e '
            const fs = require("fs");
            const p = process.env.RUNNER_TEMP + "/smoke-app/package.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const map = {
              "@kon10/auth": "modules/auth", "@kon10/cache": "modules/cache",
              "@kon10/content": "modules/content", "@kon10/core": "core",
              "@kon10/start": "start", "@kon10/storage": "modules/storage",
              "@kon10/studio-sdk": "studio-sdk", "@kon10/ui": "ui",
              "@kon10/users": "modules/users",
            };
            j.pnpm = { overrides: Object.fromEntries(Object.entries(map).map(
              ([n, d]) => [n, "file:" + process.env.GITHUB_WORKSPACE + "/packages/" + d],
            )) };
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '

      - name: Install, build, and typecheck the scaffolded app
        working-directory: ${{ runner.temp }}/smoke-app
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm exec tsc --noEmit
