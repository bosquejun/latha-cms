name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # changesets/action pushes the Version Packages PR branch
  pull-requests: write # …and opens/updates that PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify npm publishing access
        run: |
          echo "Registry: $(npm config get registry)"
          echo "Authenticated npm user:"
          npm whoami
          echo "kon10 npm organization membership:"
          npm org ls kon10
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # With pending changesets: opens/updates the "Version Packages" PR.
      # Without (i.e. that PR just merged): publishes every package whose
      # version isn't on npm yet, with provenance (see publishConfig).
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
